name: Live Wowhead Contracts

on:
  workflow_dispatch:

jobs:
  live-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run Live Integration Tests
        env:
          WOWHEAD_LIVE_TESTS: "1"
        run: pytest -q -m live
