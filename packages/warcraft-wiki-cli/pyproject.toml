[build-system]
requires = ["hatchling>=1.24.0"]
build-backend = "hatchling.build"

[project]
name = "warcraft-wiki-cli"
version = "0.1.0"
description = "Agent-first CLI for querying Warcraft Wiki"
readme = "../../README.md"
requires-python = ">=3.12"
dependencies = [
  "beautifulsoup4>=4.13.0,<5.0.0",
  "httpx>=0.28.1,<1.0.0",
  "orjson>=3.10.16,<4.0.0",
  "typer>=0.12.5,<1.0.0",
  "warcraft-api-cli>=0.1.0",
  "warcraft-content-cli>=0.1.0",
  "warcraft-core-cli>=0.1.0",
]

[project.scripts]
warcraft-wiki = "warcraft_wiki_cli.main:run"

[tool.hatch.build.targets.wheel]
packages = ["src/warcraft_wiki_cli"]
