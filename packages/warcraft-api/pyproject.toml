[build-system]
requires = ["hatchling>=1.24.0"]
build-backend = "hatchling.build"

[project]
name = "warcraft-api-cli"
version = "0.1.0"
description = "Shared API and cache utilities for the Warcraft CLI monorepo"
readme = "../../README.md"
requires-python = ">=3.12"
dependencies = [
  "httpx>=0.28.1,<1.0.0",
]

[project.optional-dependencies]
redis = [
  "redis>=5.0.0,<6.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/warcraft_api"]
