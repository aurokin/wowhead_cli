[build-system]
requires = ["hatchling>=1.24.0"]
build-backend = "hatchling.build"

[project]
name = "simc-cli"
version = "0.1.0"
description = "Agent-first CLI for local SimulationCraft workflows"
readme = "../../README.md"
requires-python = ">=3.12"
dependencies = [
  "orjson>=3.10.16,<4.0.0",
  "typer>=0.12.5,<1.0.0",
  "warcraft-core-cli>=0.1.0",
]

[project.scripts]
simc = "simc_cli.main:run"

[tool.hatch.build.targets.wheel]
packages = ["src/simc_cli"]
