[build-system]
requires = ["hatchling>=1.24.0"]
build-backend = "hatchling.build"

[project]
name = "wowprogress-cli"
version = "0.1.0"
description = "Agent-first CLI for querying WowProgress"
readme = "../../README.md"
requires-python = ">=3.12"
dependencies = [
  "beautifulsoup4>=4.13.0,<5.0.0",
  "curl_cffi>=0.14.0,<1.0.0",
  "orjson>=3.10.16,<4.0.0",
  "typer>=0.12.5,<1.0.0",
  "warcraft-api-cli>=0.1.0",
  "warcraft-core-cli>=0.1.0",
]

[project.scripts]
wowprogress = "wowprogress_cli.main:run"

[tool.hatch.build.targets.wheel]
packages = ["src/wowprogress_cli"]
