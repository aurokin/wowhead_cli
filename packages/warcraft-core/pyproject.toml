[build-system]
requires = ["hatchling>=1.24.0"]
build-backend = "hatchling.build"

[project]
name = "warcraft-core-cli"
version = "0.1.0"
description = "Shared core utilities for the Warcraft CLI monorepo"
readme = "../../README.md"
requires-python = ">=3.12"
dependencies = [
  "orjson>=3.10.16,<4.0.0",
  "typer>=0.12.5,<1.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/warcraft_core"]

