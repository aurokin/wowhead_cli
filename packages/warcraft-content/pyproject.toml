[build-system]
requires = ["hatchling>=1.24.0"]
build-backend = "hatchling.build"

[project]
name = "warcraft-content-cli"
version = "0.1.0"
description = "Shared content and storage helpers for the Warcraft CLI monorepo"
readme = "../../README.md"
requires-python = ">=3.12"

[tool.hatch.build.targets.wheel]
packages = ["src/warcraft_content"]

